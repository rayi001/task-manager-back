services:
  web:
    build: .
    container_name: task-manager-back
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "True"
    networks:
      - django_net

networks:
  django_net: