version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11
      - image: cimg/postgres:15.0
        environment:
          POSTGRES_USER: test
          POSTGRES_DB: test_db
          POSTGRES_PASSWORD: test
    environment:
      DATABASE_URL: postgres://test:test@localhost:5432/test_db

    steps:
      - checkout

      - run: pip install -r requirements.txt
      - run: python manage.py migrate
      - run: pytest

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
